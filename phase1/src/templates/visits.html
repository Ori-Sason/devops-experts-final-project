<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stats Page</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Aligns content to the left */
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
        }
        table {
            border-collapse: collapse;
            min-width: 300px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>

    <h1>visits count</h1>

    <table>
        <thead>
            <tr>
                <th>Path</th>
                <th>Visits</th>
            </tr>
        </thead>
        <tbody>
            {% for visit in visits %}
            <tr>
                <td>{{ visit.path }}</td>
                <td>{{ visit.count }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
